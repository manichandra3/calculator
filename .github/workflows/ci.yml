name: CI - Build, Test & Execute

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile

      - name: Run Tests
        run: mvn test

      - name: Build (Package)
        run: mvn package -DskipTests

      - name: Execute Application
        run: java -jar target/calculator-1.0-SNAPSHOT.jar

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/calculator-1.0-SNAPSHOT.jar
